services:
  - type: web
    name: railway-ai-track-inspector-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: RAILWAY_DEMO_USER
        value: admin
      - key: RAILWAY_DEMO_PASSWORD
        sync: false
      - key: EAGER_LOAD_MODEL
        value: "false"
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:5173,http://127.0.0.1:5173,https://railway-ai-track-inspector-web.onrender.com
      - key: CORS_ALLOWED_ORIGIN_REGEX
        value: https://.*\.onrender\.com

  - type: static
    name: railway-ai-track-inspector-web
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://railway-ai-track-inspector-api.onrender.com
